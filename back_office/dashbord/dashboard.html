<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DashBoard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
    />
    <style>
      /* À partir de sm (576px) */
      @media (min-width: 768px) {
        .offcanvas-sm {
          position: static !important;
          transform: none !important;
          visibility: visible !important;
          background-color: #fff;
          border-right: 1px solid #ddd;
          width: 250px;
          /* facultatif pour que le offcanvas-body prenne toute la hauteur */
          height: 100vh;
          padding-top: 1rem;
        }
        
      }
      .link:hover{
        background-color:rgb(248, 245, 245);
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand navbar-light shadow"
      style="background-color: #e95501"
    >
      <div class="container-fluid">
        <button
          class="btn btn-dark me-2 d-md-none"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#sidebarMenu"
          aria-controls="sidebarMenu"
        >
          <i class="fa-solid fa-bars"></i>
        </button>

        <h2 class="navbar-brand mb-0">JobAide</h2>
        <form action="" class="d-flex ms-auto" role="search">
          <input
            type="text"
            class="form-control"
            aria-describedby="helpId"
            placeholder="Chercher"
          />
          <button type="button" class="btn btn-dark">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </form>
      </div>
    </nav>
    <aside>
      <div
        class="offcanvas offcanvas-start offcanvas-sm"
        tabindex="-1"
        id="sidebarMenu"
        aria-labelledby="sidebarMenuLabel"
      >
        <div class="offcanvas-header d-md-none">
          <h5 class="offcanvas-title" id="sidebarMenuLabel">Tableau de bord</h5>
          <button
            type="button"
            class="btn-close text-reset"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body">
          <ul class="list-unstyled">
            <li><a href="#" class="nav-link link border rounded mb-2">Accueil</a></li>
            <li><a href="#" class="nav-link link border rounded mb-2">Services</a></li>
            <li><a href="#" class="nav-link link border rounded mb-2">À propos</a></li>
            <li><a href="#" class="nav-link  link border rounded mb-2">Contact</a></li>
          </ul>
        </div>
      </div>
    </aside>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
